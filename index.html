<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlmBot - Guía de Sanación</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .welcome-container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #4a7c59;
            font-weight: 600;
        }

        /* Botones de Accesibilidad (Aumentar Fuente) */
        .accessibility-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 9999;
        }

        .font-btn {
            background-color: white;
            border: 2px solid #4a7c59;
            color: #4a7c59;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .font-btn:hover {
            background-color: #4a7c59;
            color: white;
        }

        .font-btn.active {
            background-color: #4a7c59;
            color: white;
        }

        /* Estilos para la impresión (PDF) */
        @media print {
            .welcome-container, .accessibility-controls {
                display: none !important;
            }
            body {
                background: white !important;
            }
            #bp-webchat-container {
                position: relative !important;
                width: 100% !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="accessibility-controls">
        <span style="align-self: center; color: #4a7c59; font-size: 0.9em; font-weight: 600;">Tamaño de letra:</span>
        <button class="font-btn" onclick="setFontSize('15px')">A</button>
        <button class="font-btn" onclick="setFontSize('19px')">A+</button>
        <button class="font-btn" onclick="setFontSize('23px')">A++</button>
    </div>

    <div class="welcome-container">
        <h1>Bienvenido a AlmBot</h1>
        <p>Tu espacio de bio-decodificación y sanación.</p>
    </div>

    <script src="https://cdn.botpress.cloud/webchat/v2.2/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2024/10/21/18/20241021183141-8J5E6R3Y.js"></script>

    <script>
        // Lógica de Persistencia de Fuente
        const currentFontSize = localStorage.getItem('almbot-font-size') || '18px';

        function setFontSize(size) {
            localStorage.setItem('almbot-font-size', size);
            window.location.reload(); // Recargamos para aplicar el nuevo CSS al Iframe
        }

        window.botpressWebChat.init({
            "extraStylesheet": `
                /* Aplicamos la fuente Quicksand */
                body {
                    font-family: 'Quicksand', sans-serif !important;
                }

                /* Tamaño dinámico para los mensajes */
                .bpw-chat-bubble-content {
                    font-size: ${currentFontSize} !important;
                    line-height: 1.5 !important;
                }

                /* Tamaño de la caja de escritura */
                .bpw-composer textarea {
                    font-size: 16px !important;
                }

                /* Título del Chat */
                .bpw-header-title {
                    font-size: 20px !important;
                }

                /* Botones de opciones dentro del chat */
                .bpw-floating-button {
                    font-size: 16px !important;
                }
            `
        });

        // Resaltar el botón activo según la fuente guardada
        document.querySelectorAll('.font-btn').forEach(btn => {
            if (btn.innerText === 'A' && currentFontSize === '15px') btn.classList.add('active');
            if (btn.innerText === 'A+' && currentFontSize === '19px') btn.classList.add('active');
            if (btn.innerText === 'A++' && currentFontSize === '23px') btn.classList.add('active');
        });
    </script>
</body>
</html>
