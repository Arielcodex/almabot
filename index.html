<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlmBot - Herramientas para la vida</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .welcome-container {
            text-align: center;
            padding: 20px;
        }

        h1 { 
            color: #4a7c59; 
            font-weight: 600; 
            margin-bottom: 10px; 
            font-size: 2.8em;
        }

        .subtitle { 
            color: #666; 
            font-size: 1.2em; 
            font-style: italic;
            max-width: 600px;
            line-height: 1.4;
            margin: 0 auto;
        }

        /* Aseguramos que el widget tenga espacio para mostrarse */
        #bp-webchat-container {
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1>AlmBot</h1>
        <p class="subtitle">Facilitador de herramientas para la vida, situaciones, emociones, biodecodificación y terapias holísticas.</p>
    </div>

    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/04/18/02/20260418025527-TASNZZYT.js" defer></script>

    <script>
        // Configuración para la versión v3.6
        window.botpressWebChat.onEvent(function (event) {
            // Cuando el bot termina de cargar, forzamos que se abra la ventana
            if (event.type === 'LIFECYCLE.LOADED') {
                window.botpressWebChat.sendEvent({ type: 'show' });
            }
        }, ['LIFECYCLE.LOADED']);

        // Personalización visual del chat
        window.botpressWebChat.init({
            "themeName": "light",
            "fontFamily": "Quicksand",
            "overrides": {
                "header": {
                    "backgroundColor": "#4a7c59"
                },
                "launcher": {
                    "backgroundColor": "#4a7c59"
                }
            }
        });
    </script>
</body>
</html>
