<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlmBot - Facilitador de herramientas para la vida</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .welcome-container {
            text-align: center;
            padding: 20px;
        }

        h1 { 
            color: #4a7c59; 
            font-weight: 600; 
            margin-bottom: 10px; 
            font-size: 2.8em;
        }

        .subtitle { 
            color: #666; 
            font-size: 1.2em; 
            font-style: italic;
            max-width: 600px;
            line-height: 1.4;
        }

        /* Estilo para impresión de la bitácora */
        @media print {
            .welcome-container { display: none !important; }
            body { background: white !important; }
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1>AlmBot</h1>
        <p class="subtitle">Facilitador de herramientas para la vida, situaciones, emociones, biodecodificación y terapias holísticas.</p>
    </div>

    <script src="https://cdn.botpress.cloud/webchat/v2.2/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2024/10/21/18/20241021183141-8J5E6R3Y.js"></script>

    <script>
        window.botpressWebChat.init({
            "extraStylesheet": `
                body { 
                    font-family: 'Quicksand', sans-serif !important; 
                }
                .bpw-header-container {
                    background-color: #4a7c59 !important;
                }
                .bpw-chat-bubble-content {
                    font-size: 18px !important;
                    line-height: 1.5 !important;
                }
                /* Mantenemos el botón nativo para máxima compatibilidad */
                .bpw-floating-button {
                    background-color: #4a7c59 !important;
                }
            `
        });
    </script>
</body>
</html>
