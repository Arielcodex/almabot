<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almbot | Guía Holística Integrativa</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a8e6cf;
            --secondary: #dcedc1;
            --text: #4a4a4a;
            --bg-chat: #f9fdfc;
            --bg-page: #f0f4f3;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Evita el scroll elástico en móviles */
            overflow: hidden; 
        }

        /* Contenedor Principal Adaptable */
        .chat-wrapper {
            width: 100%;
            max-width: 500px;
            height: 95dvh; /* Altura dinámica para móviles */
            background: white;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            overflow: hidden;
            margin: 10px;
        }

        /* Encabezado con Texto Responsivo */
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: clamp(15px, 4vw, 25px);
            text-align: center;
            color: var(--text);
        }

        header h1 {
            /* Mínimo 1.2rem, escala 4% del ancho, máximo 1.8rem */
            font-size: clamp(1.2rem, 4.5vw, 1.8rem);
            font-weight: 500;
            letter-spacing: 1px;
        }

        header p {
            /* Mínimo 0.75rem, escala 2.5% del ancho, máximo 1rem */
            font-size: clamp(0.75rem, 3vw, 1rem);
            opacity: 0.9;
            margin-top: 5px;
            font-weight: 300;
        }

        /* Área de Chat */
        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: var(--bg-chat);
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: thin;
        }

        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: clamp(0.9rem, 2.8vw, 1rem);
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .bot { 
            background: white; 
            color: var(--text); 
            align-self: flex-start; 
            border: 1px solid #e0e0e0; 
            border-bottom-left-radius: 4px; 
        }

        .user { 
            background: var(--primary); 
            color: var(--text); 
            align-self: flex-end; 
            border-bottom-right-radius: 4px; 
        }

        .loading { font-style: italic; opacity: 0.6; font-size: 0.85rem; }

        /* Entrada de Texto */
        .input-container {
            padding: clamp(15px, 4vw, 20px);
            background: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
        }

        input {
            flex: 1;
            border: 1.5px solid #eee;
            padding: 12px 20px;
            border-radius: 30px;
            outline: none;
            font-family: 'Roboto', sans-serif;
            font-size: 1rem;
        }

        button {
            background-color: var(--primary);
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text);
            transition: background 0.3s;
        }

        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <div class="chat-wrapper">
        <header>
            <h1>Almbot</h1>
            <p>Reiki • Biodecodificación • Psicología Social</p>
        </header>

        <div id="chat-box"></div>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Escribe tu consulta..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        
        // URL de tu Google Apps Script (Verificada sin puntos finales)
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwdbcgemg7zP0_7VTZJ1b3E5T6CZaC0YHhUd5sSPH8FjgX87lAYM95nMTGA6qFkoDIZ/exec";

        let userName = "";
        let step = "asking_name";

        async function handleSend() {
            const text = userInput.value.trim();
            if (text === "" || sendBtn.disabled) return;

            addMessage(text, 'user');
            userInput.value = "";
            
            if (step === "asking_name") {
                userName = text;
                step = "chatting";
                addMessage(`Es un gusto saludarte, ${userName}. Soy tu asistente holístico. ¿Qué aspecto de tu ser o energía te gustaría explorar hoy?`, 'bot');
            } else {
                await callBackend(text);
            }
        }

        async function callBackend(text) {
            sendBtn.disabled = true;
            const loadingId = "loading-" + Date.now();
            addMessage("Sintonizando...", "bot loading", loadingId);

            try {
                // Petición GET para evitar problemas de CORS en navegadores
                const finalUrl = `${GAS_URL}?message=${encodeURIComponent(text)}&name=${encodeURIComponent(userName)}`;
                
                const response = await fetch(finalUrl);
                const data = await response.json();
                
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) loadingElement.remove();
                
                addMessage(data.reply, 'bot');
            } catch (error) {
                console.error("Error de conexión:", error);
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) {
                    loadingElement.innerText = "La conexión es inestable. Por favor, intenta de nuevo.";
                }
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addMessage(text, type, id = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            if (id) msgDiv.id = id;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Saludo inicial automático
        window.onload = () => {
            setTimeout(() => {
                addMessage("¡Hola! Te doy la bienvenida a este espacio de equilibrio. Para comenzar, ¿cómo te llamas?", 'bot');
            }, 500);
        };

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
