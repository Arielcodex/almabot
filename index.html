<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almbot | Guía Holística Integrativa</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a8e6cf;
            --secondary: #dcedc1;
            --text: #4a4a4a;
            --bg: #f9fdfc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f4f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: white;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 20px;
            text-align: center;
            color: var(--text);
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot { background: white; color: var(--text); align-self: flex-start; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
        .user { background: var(--primary); color: var(--text); align-self: flex-end; border-bottom-right-radius: 4px; }

        .loading { font-style: italic; opacity: 0.6; font-size: 0.85rem; }

        .input-container {
            padding: 20px;
            background: white;
            display: flex;
            gap: 12px;
            border-top: 1px solid #eee;
        }

        input {
            flex: 1;
            border: 1.5px solid #eee;
            padding: 12px 20px;
            border-radius: 30px;
            outline: none;
        }

        button {
            background-color: var(--primary);
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text);
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="chat-wrapper">
        <header>
            <h1>Almbot</h1>
            <p>Reiki • Biodecodificación • Psicología Social</p>
        </header>

        <div id="chat-box"></div>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Escribe aquí..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwdbcgemg7zP0_7VTZJ1b3E5T6CZaC0YHhUd5sSPH8FjgX87lAYM95nMTGA6qFkoDIZ/exec";

        let userName = "";
        let step = "asking_name";

        async function handleSend() {
            const text = userInput.value.trim();
            if (text === "" || sendBtn.disabled) return;

            addMessage(text, 'user');
            userInput.value = "";
            
            if (step === "asking_name") {
                userName = text;
                step = "chatting";
                addMessage(`Es un gusto saludarte, ${userName}. Soy Almbot. ¿En qué área de tu bienestar te gustaría profundizar hoy? (Reiki, Biodecodificación, Vínculos...)`, 'bot');
            } else {
                await callBackend(text);
            }
        }

        async function callBackend(text) {
            sendBtn.disabled = true;
            const loadingId = "loading-" + Date.now();
            addMessage("Conectando con tu energía...", "bot loading", loadingId);

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Importante para Google Apps Script desde el navegador
                    body: JSON.stringify({ message: text, name: userName })
                });

                // Nota: Debido al modo 'no-cors', no siempre podemos leer la respuesta directa por seguridad del navegador.
                // Si el bot no responde en tu prueba, necesitaremos ajustar el código de Google Apps Script 
                // para permitir solicitudes de origen cruzado (CORS).
                
                // Por ahora, simulamos la espera de la API.
                // Si ya configuraste el doPost correctamente, el bot debería procesar la info.
                
                // Como alternativa segura para leer la respuesta:
                const realResponse = await fetch(GAS_URL + "?message=" + encodeURIComponent(text) + "&name=" + encodeURIComponent(userName));
                const data = await realResponse.json();
                
                document.getElementById(loadingId).remove();
                addMessage(data.reply, 'bot');
            } catch (error) {
                console.error(error);
                document.getElementById(loadingId).innerText = "Resintonizando... cuéntame un poco más.";
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addMessage(text, type, id = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            if (id) msgDiv.id = id;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        window.onload = () => {
            setTimeout(() => {
                addMessage("¡Hola! Bienvenido a este espacio de introspección. Para comenzar, ¿cómo te llamas?", 'bot');
            }, 500);
        };

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
